services:
  # 1. The FactGuard Python Backend (FastAPI)
  - type: web
    name: factguard-api
    env: python
    buildCommand: pip install -r apps/api/requirements.txt
    startCommand: cd apps/api && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: factguard-db
          property: connectionString
      - key: PROJECT_NAME
        value: "FACTGUARD PRODUCTION TERMINAL"

  # 2. The FactGuard React Frontend (Vite)
  - type: web
    name: factguard-web
    env: static
    buildCommand: cd apps/web && npm install && npm run build
    staticPublishPath: apps/web/dist
    envVars:
      - key: VITE_API_URL
        value: https://factguard-api.onrender.com # Use your backend's URL here

# 3. Managed PostgreSQL Database
databases:
  - name: factguard-db
    plan: free
